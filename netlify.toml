# TealKin — Netlify configuration

[[redirects]]
  from = "/"
  to = "/en/index.html"
  status = 302
  conditions = {Language = ["en", "en-US", "en-GB"]}

[[redirects]]
  from = "/"
  to = "/es/index.html"
  status = 302
  conditions = {Language = ["es", "es-MX", "es-CO", "es-AR", "es-PE", "es-CL"]}

[[redirects]]
  from = "/"
  to = "/en/index.html"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
