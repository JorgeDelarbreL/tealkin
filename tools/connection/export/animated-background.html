<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TealKin — animated background, isolated</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="../vendor/gsap.min.js"></script>
<script src="../vendor/ScrollTrigger.min.js"></script>
<link rel="stylesheet" href="tokens.css">
</head>
<body>

<!--
  The animated background is two cooperating layers:

  1. #bg-layer — a fixed, full-viewport <div> sitting behind everything (z-index:0).
     Its backgroundColor is NOT set in CSS; it's driven every scroll frame by
     interpolating across `bgColorStops` using the GLOBAL scroll progress
     (0–1 across the whole horizontal track). This is what makes the page's
     base color slowly shift from night-blue, through dawn orange, jungle
     green, cave black, firelight amber, etc., independent of whatever SVG
     scene is currently in view.

  2. Each <section class="scene"> contains its own inline <svg> (z-index:0,
     positioned absolute, filling the scene) with its own local elements
     (sky gradient, sun, sea, sand) that fade/move/recolor based on that
     scene's LOCAL progress (0–1 within just that scene's slice of scroll).

  Below is scene 1 ("Dawn") kept as a working example — it's the simplest
  case of a scene driving its own SVG colors. The same edgeWindow/sceneProgressTrigger
  pattern in the full project is used for every other scene.
-->

<div id="bg-layer"></div>

<div class="scroll-spacer" id="spacer">
  <div class="pin-wrap">
    <div class="track" id="track">

      <section class="scene" id="s1">
        <svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMax slice">
          <defs>
            <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
              <stop id="s1-sky-stop1" offset="0%" stop-color="#0a0f28"/>
              <stop id="s1-sky-stop2" offset="100%" stop-color="#1c1442"/>
            </linearGradient>
          </defs>
          <rect width="1000" height="600" fill="url(#skyGrad)"/>
          <rect id="s1-orange" width="1000" height="600" fill="#e8843a" opacity="0"/>
          <circle id="s1-sun" cx="500" cy="480" r="0" fill="#f5f3ee" opacity="0"/>
          <polygon id="s1-sea-bg" points="0,440 1000,440 1000,600 0,600" fill="#0d2a36"/>
          <g id="s1-sea" stroke="#1a9b8c" stroke-width="2" fill="none" opacity="0.5">
            <path id="s1-sea-wave1"/>
            <path id="s1-sea-wave2"/>
          </g>
          <polygon id="s1-sand-bg" points="0,520 1000,520 1000,600 0,600" fill="#3a2f22"/>
          <g id="s1-sand-texture" stroke="#241a10" stroke-width="1.5" fill="none" opacity="0.5">
            <path d="M-20 540 Q60 534 140 540 T300 540 T460 540 T620 540 T780 540 T940 540 T1100 540"/>
            <path d="M-20 566 Q60 560 140 566 T300 566 T460 566 T620 566 T780 566 T940 566 T1100 566"/>
          </g>
          <g id="s1-sand-dots" fill="#8a6a42" opacity="0"></g>
        </svg>
        <div class="scene-inner">
          <p class="caption" id="s1-caption" style="opacity:0;">Before the first word, there was already connection.</p>
        </div>
        <span class="scene-tag" id="s1-tag" style="opacity:0;">01 — Dawn</span>
      </section>

      <!-- a second, minimal scene so the track has somewhere to scroll to —
           swap this out for your own scenes; .scene { --w: N } controls how
           many viewport-widths wide a scene is -->
      <section class="scene" id="s2">
        <svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMax slice">
          <rect width="1000" height="600" fill="#f3e3c4"/>
        </svg>
        <div class="scene-inner">
          <p class="caption caption-light">Next scene goes here.</p>
        </div>
      </section>

    </div>
  </div>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

const track = document.getElementById('track');
const scenes = track.querySelectorAll('.scene');

function getSceneWidth(el){ return (parseFloat(el.style.getPropertyValue('--w')) || 1) * window.innerWidth; }
function getTotalWidth(){ return Array.from(scenes).reduce((sum, el) => sum + getSceneWidth(el), 0); }

const bgLayer = document.getElementById('bg-layer');

// the page-level background tint, sampled across GLOBAL scroll progress (0–1).
// add/remove stops to add more "mood" stages to the journey; each stop lands
// at i/(stops.length-1) of total progress.
const bgColorStops = [
  '#0a1628', '#8a4a28', '#0f3530', '#23282a', '#0d1f24',
  '#0a1628', '#2e1f14', '#7a4a28', '#f5f3ee'
];

let scrollTween;
function buildScroll(){
  if (scrollTween) scrollTween.scrollTrigger.kill();
  const totalWidth = getTotalWidth();
  const distance = totalWidth - window.innerWidth;

  scrollTween = gsap.to(track, {
    x: () => -distance,
    ease: 'none',
    scrollTrigger: {
      trigger: '#spacer',
      start: 'top top',
      end: () => '+=' + distance,
      scrub: true,
      pin: true,
      anticipatePin: 1,
      invalidateOnRefresh: true,
      onUpdate: self => {
        const color = gsap.utils.interpolate(bgColorStops, self.progress);
        gsap.set(bgLayer, {backgroundColor: color});
        runSceneOneAnimation(self.progress);
      }
    }
  });
}

// helper to scatter randomized dots in an SVG container (sand texture, etc.)
function scatterDots(container, n, xMin, xMax, yMin, yMax, r, seed){
  let html = '';
  for (let i = 0; i < n; i++) {
    const rx = Math.sin(i*12.9898 + seed) * 43758.5453 % 1;
    const ry = Math.sin(i*78.233 + seed) * 12345.678 % 1;
    const x = xMin + Math.abs(rx) * (xMax-xMin);
    const y = yMin + Math.abs(ry) * (yMax-yMin);
    html += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r}"/>`;
  }
  container.innerHTML = html;
}

function wavePath(width, y, step, amp){
  let d = `M-20 ${y} Q${step/2} ${y-amp} ${step} ${y}`;
  for (let x = step*2; x <= width+step; x += step) d += ` T${x} ${y}`;
  return d;
}

scatterDots(document.getElementById('s1-sand-dots'), 60, 0, 1000, 522, 600, 1.6, 41);
document.getElementById('s1-sea-wave1').setAttribute('d', wavePath(1000, 460, 80, 12));
document.getElementById('s1-sea-wave2').setAttribute('d', wavePath(1000, 488, 80, 12));

// scene 1's own local animation: a self-contained example of an SVG-driven
// foreground animation reacting to the scene's local scroll progress (here
// approximated against global progress since this demo has only two scenes)
function runSceneOneAnimation(p){
  const sunRise = Math.min(p/0.18, 1);
  const glowFade = 1 - gsap.utils.clamp(0,1,(p-0.18)/0.12);
  gsap.set('#s1-orange', {opacity: Math.min(sunRise*0.9, 0.6)*glowFade});
  gsap.set('#s1-sun', {cy: 480 - sunRise*290, r: sunRise*42, opacity: Math.min(sunRise*3,1)});

  const seaColor = gsap.utils.interpolate('#0d2a36', '#1a9b8c', sunRise);
  const sandColor = gsap.utils.interpolate('#3a2f22', '#d9c08c', sunRise);
  gsap.set('#s1-sea-bg', {fill: seaColor});
  const seaLineColor = gsap.utils.interpolate('#1a9b8c', '#3aa89a', sunRise);
  gsap.set('#s1-sea', {stroke: seaLineColor});
  gsap.set('#s1-sand-bg', {fill: sandColor});
  const textureFade = Math.max(0, (sunRise-0.15)/0.5);
  gsap.set('#s1-sand-dots', {opacity: textureFade*0.5});

  const skyColor = gsap.utils.interpolate('#0a0f28', '#f3e3c4', sunRise);
  const skyColor2 = gsap.utils.interpolate('#1c1442', '#f3e3c4', sunRise);
  gsap.set('#s1-sky-stop1', {attr:{'stop-color': skyColor}});
  gsap.set('#s1-sky-stop2', {attr:{'stop-color': skyColor2}});

  const textIn = Math.min(p/0.08, 1);
  gsap.set('#s1-caption', {opacity: textIn});
  gsap.set('#s1-tag', {opacity: textIn*0.55});
}

window.addEventListener('load', buildScroll);
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => ScrollTrigger.refresh());
}
window.addEventListener('resize', () => { ScrollTrigger.refresh(); });
</script>
</body>
</html>
